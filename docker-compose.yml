services:
  postgres:
    image: postgres:17
    container_name: main-service-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin}
      POSTGRES_DB: ${POSTGRES_DB:-main-service-db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    restart: on-failure
    shm_size: 128mb
    volumes:
      - main-service-postgres-data:/var/lib/postgresql/data
    networks:
      - main-service-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-main-service-db}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  main-service-network:

volumes:
  main-service-postgres-data:
